	async function login() {

    let uid = document.getElementById("userId").value;

    const response = await fetch("data.json");

    const data = await response.json();

    const emp = data.employees.find(
        e => e.userId === uid
    );

    let output = "";

    if (emp) {

        output += `<h2>Welcome ${emp.name}</h2>`;

        emp.works.forEach(work => {

            output += `
                <div class="card">
                    <h3>${work.title}</h3>
                    <p>Assigned : ${work.assignedDate}</p>
                    <p>Due : ${work.dueDate}</p>
                    <p>Status : ${work.status}</p>
                </div>
            `;
        });

    } else {

        output = "<h3>User Not Found</h3>";
    }

    document.getElementById("dashboard").innerHTML = output;
}
